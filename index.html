<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Rush Reflex</title><style>
body{margin:0;overflow:hidden;background:#0b1220;color:#fff;font-family:Arial}
canvas{display:block}
.ui{position:absolute;top:10px;left:10px;display:flex;gap:10px}
.pill{background:#111a33;padding:8px 12px;border-radius:20px;font-weight:bold}
</style></head><body><canvas id="game"></canvas>

<div class="ui">
<div class="pill" id="score">0</div>
<div class="pill" id="combo">x1</div>
<div class="pill" id="level">Lv1</div>
<div class="pill" id="time">30</div>
</div><script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let w,h;
function resize(){w=canvas.width=innerWidth;h=canvas.height=innerHeight}
resize();addEventListener("resize",resize);

let score=0,combo=1,level=1,time=30;
let running=true;

const orb={x:200,y:200,r:30,vx:200,vy:150};
const clicks=[];

function beep(freq){
  const a=new (window.AudioContext||window.webkitAudioContext)();
  const o=a.createOscillator();
  const g=a.createGain();
  o.frequency.value=freq;
  o.connect(g);
  g.connect(a.destination);
  o.start();
  g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+0.2);
}

function spawnClick(x,y,color){
  clicks.push({x,y,r:10,life:0.2,color});
}

function update(dt){
  time-=dt;
  if(time<=0)running=false;

  orb.x+=orb.vx*dt;
  orb.y+=orb.vy*dt;

  if(orb.x<0||orb.x>w)orb.vx*=-1;
  if(orb.y<0||orb.y>h)orb.vy*=-1;

  clicks.forEach(c=>{
    c.r+=300*dt;
    c.life-=dt;
  });

  for(let i=clicks.length-1;i>=0;i--){
    if(clicks[i].life<=0)clicks.splice(i,1);
  }
}

function draw(){
  ctx.clearRect(0,0,w,h);

  ctx.fillStyle="cyan";
  ctx.beginPath();
  ctx.arc(orb.x,orb.y,orb.r,0,Math.PI*2);
  ctx.fill();

  clicks.forEach(c=>{
    ctx.strokeStyle=c.color;
    ctx.globalAlpha=c.life*3;
    ctx.lineWidth=4;
    ctx.beginPath();
    ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.stroke();
    ctx.globalAlpha=1;
  });
}

function loop(){
  if(!running)return;
  update(0.016);
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

canvas.onclick=e=>{
  const x=e.clientX;
  const y=e.clientY;

  if(Math.hypot(x-orb.x,y-orb.y)<orb.r){
    score+=combo;
    combo++;
    spawnClick(x,y,"lime");
    beep(800);

    if(score%20===0){
      level++;
      time+=5;
      beep(1200);
    }

  }else{
    combo=1;
    time-=2;
    spawnClick(x,y,"red");
    beep(200);
  }

  updateUI();
}

function updateUI(){
  document.getElementById("score").textContent=score;
  document.getElementById("combo").textContent="x"+combo;
  document.getElementById("level").textContent="Lv"+level;
  document.getElementById("time").textContent=Math.floor(time);
}
</script></body>
</html>

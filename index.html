<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Rush Reflex FINAL READY</title>
<style>
body{margin:0;overflow:hidden;background:#0b1224;color:#fff;font-family:sans-serif}
canvas{display:block}
#ui{position:absolute;top:0;left:0;right:100px;padding:10px}
#side{position:absolute;right:0;top:0;width:100px;height:100%;background:rgba(255,255,255,.05);display:flex;flex-direction:column;align-items:center;padding-top:20px}
.badge{background:#111;padding:10px;border-radius:10px;margin:8px;text-align:center;width:80px}
#end{position:absolute;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.85);flex-direction:column}
button{margin-top:10px;padding:12px 18px;border:none;border-radius:20px;background:#22c55e;color:#000;font-weight:bold}
</style>
</head>
<body>

<canvas id="game"></canvas>

<div id="ui">
Tap Rush Reflex 🔥
<div>
Score: <span id="s">0</span> |
Level: <span id="l">1</span> |
Time: <span id="t">40</span>
</div>
</div>

<div id="side">
<div class="badge" id="fx">Ready</div>
<div class="badge">
🏆 Best
<div id="leaderboard"></div>
</div>
</div>

<div id="end">
<h1>🏆 Score: <span id="fs"></span></h1>
<button onclick="restart()">Play Again</button>
</div>

<script src="https://sdk.crazygames.com/crazygames-sdk-v3.js"></script>

<script>
const c=document.getElementById("game"),ctx=c.getContext("2d");
let w,h;function resize(){w=c.width=innerWidth;h=c.height=innerHeight}resize();onresize=resize;

let score,level,time,combo,orb,run;
let scores=JSON.parse(localStorage.getItem("scores")||"[]");

function updateLeaderboard(){
 let top=scores.slice(0,5).map((s,i)=>"#"+(i+1)+" "+s).join("<br>");
 document.getElementById("leaderboard").innerHTML=top;
}

function start(){
 score=0;level=1;time=40;combo=1;
 orb={x:200,y:300,r:30,vx:200,vy:150};
 run=true;
 CrazyGames.SDK?.game?.gameplayStart?.();
}

function restart(){
 document.getElementById("end").style.display="none";
 start();
}

function endGame(){
 run=false;
 document.getElementById("fs").innerText=score;
 document.getElementById("end").style.display="flex";

 scores.push(score);
 scores.sort((a,b)=>b-a);
 scores=scores.slice(0,5);
 localStorage.setItem("scores",JSON.stringify(scores));
 updateLeaderboard();

 CrazyGames.SDK?.game?.gameplayStop?.();
}

start();
updateLeaderboard();

c.onclick=e=>{
 if(!run)return;
 let dx=e.clientX-orb.x,dy=e.clientY-orb.y;

 if(Math.hypot(dx,dy)<orb.r){
  score+=combo;combo++;
  document.getElementById("fx").innerText="🔥 x"+combo;

  if(score%15===0){level++;time+=5;orb.r=Math.max(15,orb.r-2);}
 }else{
  combo=1;time-=2;
  document.getElementById("fx").innerText="❌";
 }
};

function loop(){
 ctx.clearRect(0,0,w,h);

 if(run){
  orb.x+=orb.vx*0.016;
  orb.y+=orb.vy*0.016;

  if(orb.x<orb.r||orb.x>w-orb.r)orb.vx*=-1;
  if(orb.y<80||orb.y>h-orb.r)orb.vy*=-1;

  time-=0.016;
  if(time<=0) endGame();

  document.getElementById("s").innerText=score;
  document.getElementById("l").innerText=level;
  document.getElementById("t").innerText=Math.floor(time);

  ctx.fillStyle="#22d3ee";
  ctx.beginPath();
  ctx.arc(orb.x,orb.y,orb.r,0,Math.PI*2);
  ctx.fill();
 }

 requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
